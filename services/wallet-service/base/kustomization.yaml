# services/wallet-service/base/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wallet-service

generatorOptions:
  disableNameSuffixHash: true

resources:
  # Deployments
  - api-deployment.yaml
  - rabbitmq-consumer-deployment.yaml
  - producer-deployment.yaml
  
  # Service (only for API)
  - service.yaml
  
  # PVCs (only for API)
  - pvc.yaml
  
  # Security & Credentials
  - wallet-sa.yaml
  - wallet-secrets.yaml
  - postgres-credentials.yaml
  - rabbitmq-credentials.yaml  
  - kafka-credentials.yaml      
  - redis-credentials.yaml

configMapGenerator:
  - name: wallet-config
    literals:
      - SERVICE_NAME=wallet
      - DB_NAME=walletdb
      - DJANGO_SETTINGS_MODULE=wallet_service.settings
      - DJANGO_ALLOWED_HOSTS=wallet-service,wallet-service.wallet-service.svc.cluster.local,localhost,127.0.0.1
      - KAFKA_GROUP_ID=wallet_service_id
      - AUTH_SERVICE_URL=http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/
      - AUTH_PUBLIC_KEY_URL=http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/users/public_key/
      - LOG_LEVEL=INFO
      - RABBITMQ_QUEUE=wallet_service.commands
      - RABBITMQ_VHOST=microservice_one
      - KAFKA_TOPIC=microservice_one.events
      - POSTGRES_HOST=postgres.infrastructure.svc.cluster.local
      - POSTGRES_PORT=5432
      - DB_HOST=postgres.infrastructure.svc.cluster.local
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq.infrastructure.svc.cluster.local
      - REDIS_HOST=redis.infrastructure.svc.cluster.local
      - KAFKA_BROKERS=kafka-cluster-kafka-bootstrap.kafka-operator.svc.cluster.local:9092
      - LIKES_CACHE_TTL=300
      - AUTHOR_TIMELINE_CACHE_TTL=120
      - CHANNEL_LAYER_HOSTS=redis.infrastructure.svc.cluster.local:6379
      - CHANNEL_LAYER_CAPACITY=1000
      - CHANNEL_LAYER_EXPIRY=10
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - CORS_ALLOW_CREDENTIALS=True
      - DJANGO_SECRET_KEY=your-secret-key-here-change-in-production
      - DJANGO_DEBUG=False
      - DJANGO_LANGUAGE_CODE=en-us
      - DJANGO_TIME_ZONE=UTC
      - REDIS_DB=0
      - REDIS_SOCKET_TIMEOUT=2
      - REDIS_CONNECT_TIMEOUT=2
      - REDIS_RETRY_ON_TIMEOUT=true
      - REDIS_PASSWORD=
      - REDIS_PORT=6379
      - JWT_SECRET=my_jwt_secret_123!

images:
  - name: alphaxad9/wallet_service
    newTag: "0.0.6"

patches:
  # Add Host header to API probes only
  - target:
      kind: Deployment
      name: wallet-api
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/httpHeaders
        value:
          - name: Host
            value: wallet-service
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/httpHeaders
        value:
          - name: Host
            value: wallet-service
      - op: add
        path: /spec/template/spec/containers/0/startupProbe/httpGet/httpHeaders
        value:
          - name: Host
            value: wallet-service