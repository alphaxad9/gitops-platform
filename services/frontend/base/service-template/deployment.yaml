# services/frontend/base/service-template/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-placeholder
  labels:
    app: service-placeholder
    service: service-placeholder
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: service-placeholder
  template:
    metadata:
      labels:
        app: service-placeholder
        service: service-placeholder
    spec:
      containers:
        - name: service-placeholder
          image: placeholder:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10