apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: frontend
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: frontend.local
    http:
      paths:
      # API routes - these go directly to services
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            namespace: auth-service
            port:
              number: 8000
      - path: /api/room
        pathType: Prefix
        backend:
          service:
            name: room-service
            namespace: room-service
            port:
              number: 8000
      - path: /api/booking
        pathType: Prefix
        backend:
          service:
            name: booking-service
            namespace: booking-service
            port:
              number: 8000
      - path: /api/post
        pathType: Prefix
        backend:
          service:
            name: post-service
            namespace: post-service
            port:
              number: 8080
      - path: /api/wallet
        pathType: Prefix
        backend:
          service:
            name: wallet-service
            namespace: wallet-service
            port:
              number: 8000
      # Frontend static files - serve React app
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            namespace: frontend
            port:
              number: 80