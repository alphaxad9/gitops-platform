apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend

resources:
  - ../../base

labels:
  - pairs:
      environment: production
      managed-by: gitops
    includeSelectors: false

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
  
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 200m
    target:
      kind: Deployment
  
  # Production-specific: Add PodDisruptionBudget
  - patch: |-
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: frontend-pdb
      spec:
        minAvailable: 2
    target:
      kind: PodDisruptionBudget
  
  # Production-specific: Add horizontal pod autoscaling
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: frontend-hpa
      spec:
        minReplicas: 3
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
    target:
      kind: HorizontalPodAutoscaler