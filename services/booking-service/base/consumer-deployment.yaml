# services/booking-service/base/consumer-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-consumer
  labels:
    app: booking-service
    component: consumer
    managed-by: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
      component: consumer
  template:
    metadata:
      labels:
        app: booking-service
        component: consumer
    spec:
      serviceAccountName: booking-service-sa
      containers:
      - name: booking-consumer
        image: alphaxad9/booking_service:0.0.4
        imagePullPolicy: IfNotPresent
        command: ["python", "manage.py", "run_kafka_consumer"]
        envFrom:
        - configMapRef:
            name: booking-config
        - secretRef:
            name: booking-secrets
        - secretRef:
            name: postgres-credentials
        - secretRef:
            name: rabbitmq-credentials
        - secretRef:
            name: kafka-credentials
        - secretRef:
            name: redis-credentials
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_COMPONENT
          value: "kafka-consumer"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        volumeMounts:
        - name: keys
          mountPath: /app/keys
          readOnly: true
      volumes:
      - name: keys
        secret:
          secretName: booking-secrets
          items:
          - key: SIGNING_KEY
            path: private.pem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000