# services/post-service/overlays/staging/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: post-service

resources:
  - ../../base

labels:
  - pairs:
      environment: staging
      managed-by: gitops
    includeSelectors: false
    
configMapGenerator:
  - name: post-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
      - GIN_MODE=release
      - FRONTEND_URL=https://staging.yourdomain.com
      - CORS_ALLOWED_ORIGINS=https://staging.yourdomain.com
      - CSRF_TRUSTED_ORIGINS=https://staging.yourdomain.com
      - CORS_ALLOW_CREDENTIALS=True
      - AUTH_PUBLIC_KEY_URL=http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/users/public_key/
      - AUTH_SERVICE_URL=http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one
      - KAFKA_BROKERS=kafka-cluster-kafka-bootstrap.kafka-operator.svc.cluster.local:9092
      - KAFKA_TOPIC=microservice_one.events
      - KAFKA_GROUP_ID=post_service_outbox_publisher
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT
      - KAFKA_ENABLE_AUTO_COMMIT=false
      - KAFKA_AUTO_OFFSET_RESET=earliest
      - KAFKA_RETRIES=5
      - KAFKA_POLL_TIMEOUT=1.0
      - POSTGRES_HOST=postgres.infrastructure.svc.cluster.local
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgresgo1
      - POSTGRES_USER=ishimwe
      - PORT=8080
      - AUTH_PUBLIC_KEY_TTL=300

patches:
  # Set replicas for all deployments in staging
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: post-api
  
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: post-consumer
  
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: post-producer
  
  # Update resource requests/limits for staging
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
    target:
      kind: Deployment
      name: post-api
  
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
    target:
      kind: Deployment
      name: post-consumer
  
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
    target:
      kind: Deployment
      name: post-producer