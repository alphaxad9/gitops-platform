apiVersion: v1
kind: Secret
metadata:
  name: kafka-credentials
  labels:
    app: kafka
    app.kubernetes.io/component: message-broker
type: Opaque
stringData:
  # Post service Kafka client ID
  POST_KAFKA_CLIENT_ID: post-service
  
  # Kafka broker addresses (for reference)
  KAFKA_BROKERS: "localhost:9092,localhost:9093"
  
  # Kafka topics
  KAFKA_TOPIC: "microservice_one.events"
  
  # Kafka consumer group
  KAFKA_GROUP_ID: "post_service_outbox_publisher"
  
  # Kafka configuration
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
  KAFKA_ENABLE_AUTO_COMMIT: "false"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  KAFKA_RETRIES: "5"
  KAFKA_POLL_TIMEOUT: "1.0"
  
  # Since using PLAINTEXT, no SASL credentials needed
  # KAFKA_SASL_USERNAME: ""
  # KAFKA_SASL_PASSWORD: ""