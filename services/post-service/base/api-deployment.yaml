# services/post-service/base/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-api
  labels:
    app: post-service
    component: api
    managed-by: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: post-service
      component: api
  template:
    metadata:
      labels:
        app: post-service
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: post-service-sa
      containers:
      - name: post-api
        image: alphaxad9/post_service:0.0.7
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: post-config
        - secretRef:
            name: post-secrets
        - secretRef:
            name: postgres-credentials
        - secretRef:
            name: kafka-credentials
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/  
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/  
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health/  
            port: http
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001