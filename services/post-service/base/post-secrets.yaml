apiVersion: v1
kind: Secret
metadata:
  name: post-secrets
  labels:
    app: post
    app.kubernetes.io/component: post-service
type: Opaque
stringData:
  # JWT Secret for token verification
  JWT_SECRET: "my_jwt_secret_123!"
  
  # Internal API Key for service-to-service communication
  INTERNAL_API_KEY: "super-secret-internal-key-change-in-prod"
  
  # Auth Service Configuration
  AUTH_PUBLIC_KEY_URL: "http://auth-service:8000/zedvye_one/users/public_key/"
  AUTH_SERVICE_URL: "http://auth-service:8000/zedvye_one"
  AUTH_PUBLIC_KEY_TTL: "300"
  
  # Server Configuration
  GIN_MODE: "debug"
  PORT: "8080"
  
