apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: room-service

resources:
  - ../../base

labels:
  - pairs:
      environment: dev
      managed-by: gitops
    includeSelectors: false
    
configMapGenerator:
  - name: room-config
    behavior: merge
    literals:
      - LOG_LEVEL=DEBUG
      - DJANGO_DEBUG=True
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000,http://localhost:8002
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://localhost:8000,http://localhost:8002

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment