apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth-service

resources:
  - ../../base

labels:
  - pairs:
      environment: dev
    includeSelectors: false

generatorOptions:
  disableNameSuffixHash: false

configMapGenerator:
  - name: auth-config
    behavior: replace
    literals:
      - SERVICE_NAME=auth
      - DB_NAME=authdb
      - DJANGO_SETTINGS_MODULE=my_backend.settings
      - DJANGO_ALLOWED_HOSTS=auth-service,auth-service.auth-service.svc.cluster.local,localhost,127.0.0.1,auth.local
      - DJANGO_DEBUG=True
      - LOG_LEVEL=DEBUG
      - KAFKA_GROUP_ID=auth_consumer_group
      - AUTH_PUBLIC_KEY_URL=http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/users/public_key/
      - RABBITMQ_QUEUE=auth.events
      - RABBITMQ_VHOST=auth_service
      - KAFKA_TOPIC=microservice_one.events
      - POSTGRES_HOST=postgres.infrastructure.svc.cluster.local
      - POSTGRES_PORT=5432
      - DB_HOST=postgres.infrastructure.svc.cluster.local
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq.infrastructure.svc.cluster.local
      - REDIS_HOST=redis.infrastructure.svc.cluster.local
      - KAFKA_BROKERS=kafka-cluster-kafka-bootstrap.kafka-operator.svc.cluster.local:9092
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000
      - CHANNEL_LAYER_HOSTS=redis.infrastructure.svc.cluster.local:6379

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: auth-api
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: auth-consumer
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: auth-producer