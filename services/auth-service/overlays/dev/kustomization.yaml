apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth-service

resources:
  - ../../base

labels:
  - pairs:
      environment: dev
    includeSelectors: false
    
configMapGenerator:
  - name: auth-config
    behavior: merge
    literals:
      - LOG_LEVEL=DEBUG
      - DJANGO_DEBUG=True
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000
      - CHANNEL_LAYER_HOSTS=redis-master.infrastructure.svc.cluster.local:6379

patches:
  # Set replicas for all deployments in dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: auth-api
  
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: auth-consumer
  
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: auth-producer