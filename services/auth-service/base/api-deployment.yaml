# services/auth-service/base/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  labels:
    app: auth-service
    component: api
    managed-by: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
      component: api
  template:
    metadata:
      labels:
        app: auth-service
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: auth-service-sa
      containers:
      - name: auth-api
        image: alphaxad9/auth-service:0.1.4
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8001
          name: metrics
        envFrom:
        - configMapRef:
            name: auth-config
        - secretRef:
            name: auth-secrets
        - secretRef:
            name: postgres-credentials
        - secretRef:
            name: rabbitmq-credentials
        - secretRef:
            name: kafka-credentials
        - secretRef:
            name: redis-credentials
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: DJANGO_SETTINGS_MODULE
          value: "my_backend.settings"
        resources:
          requests:
            memory: "256Mi"   # Reduced from 512Mi
            cpu: "100m"       # Reduced from 250m
          limits:
            memory: "512Mi"   # Reduced from 1Gi
            cpu: "500m"       # Kept the same (burst capacity)
        livenessProbe:
          httpGet:
            path: /health/
            port: http
            httpHeaders:
            - name: Host
              value: auth-service
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/
            port: http
            httpHeaders:
            - name: Host
              value: auth-service
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health/
            port: http
            httpHeaders:
            - name: Host
              value: auth-service
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: static-files
          mountPath: /app/static
        - name: media-files
          mountPath: /app/media
        - name: keys
          mountPath: /app/keys
          readOnly: true
      volumes:
      - name: static-files
        persistentVolumeClaim:
          claimName: auth-service-static-pvc
      - name: media-files
        persistentVolumeClaim:
          claimName: auth-service-media-pvc
      - name: tmp
        emptyDir: {}
      - name: keys
        secret:
          secretName: auth-secrets
          items:
          - key: SIGNING_KEY
            path: private.pem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000