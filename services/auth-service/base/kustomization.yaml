apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth-service

# 👇 Disable hash suffix so ConfigMap name stays "auth-config"
generatorOptions:
  disableNameSuffixHash: true

resources:
  - ../../base/service-template
  - auth-secrets.yaml
  - auth-sa.yaml
  - postgres-credentials.yaml
  - rabbitmq-credentials.yaml  
  - kafka-credentials.yaml      
  - redis-credentials.yaml   

configMapGenerator:
  - name: auth-config
    literals:
      - SERVICE_NAME=auth
      - DB_NAME=authdb
      - DJANGO_SETTINGS_MODULE=my_backend.settings
      - DJANGO_ALLOWED_HOSTS=auth-service,auth-service.auth-service.svc.cluster.local,localhost,127.0.0.1
      - KAFKA_GROUP_ID=my_backend_id
      - AUTH_PUBLIC_KEY_URL=http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/users/public_key/
      - LOG_LEVEL=INFO
      - RABBITMQ_QUEUE=microservice_one.events
      - RABBITMQ_VHOST=microservice_one
      - KAFKA_TOPIC=microservice_one.events
      - POSTGRES_HOST=postgres.infrastructure.svc.cluster.local
      - POSTGRES_PORT=5432
      - DB_HOST=postgres.infrastructure.svc.cluster.local
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq.infrastructure.svc.cluster.local
      - REDIS_HOST=redis.infrastructure.svc.cluster.local
      - KAFKA_BROKERS=kafka-cluster-kafka-bootstrap.kafka-operator.svc.cluster.local:9092

images:
  - name: placeholder
    newName: alphaxad9/auth-service
    newTag: "0.0.7"

patches:
  # ✅ Patch postgres-credentials with POSTGRES_* keys
  - target:
      kind: Secret
      name: postgres-credentials
    patch: |-
      - op: replace
        path: /stringData/POSTGRES_DB
        value: authdb
      - op: replace
        path: /stringData/POSTGRES_USER
        value: ishimwe
      - op: replace
        path: /stringData/POSTGRES_PASSWORD
        value: "2025New+"

  # Patch deployment name and all references
  - target:
      kind: Deployment
      name: service-placeholder
    patch: |-
      - op: replace
        path: /metadata/name
        value: auth-service
      - op: replace
        path: /metadata/labels/app
        value: auth-service
      - op: replace
        path: /metadata/labels/service
        value: auth-service
      - op: replace
        path: /spec/selector/matchLabels/app
        value: auth-service
      - op: replace
        path: /spec/template/metadata/labels/app
        value: auth-service
      - op: replace
        path: /spec/template/metadata/labels/service
        value: auth-service
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: auth-service-sa
      - op: replace
        path: /spec/template/spec/containers/0/name
        value: auth-service
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: auth-config
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: auth-secrets

  # ADD securityContext to fix volume permissions
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000

  # ADD Host header to all probes (PRODUCTION FIX)
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/httpHeaders
        value:
          - name: Host
            value: auth-service
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/httpHeaders
        value:
          - name: Host
            value: auth-service
      - op: add
        path: /spec/template/spec/containers/0/startupProbe/httpGet/httpHeaders
        value:
          - name: Host
            value: auth-service

  # ADD keys volume and volumeMount
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: keys
          mountPath: /app/keys
          readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: keys
          secret:
            secretName: auth-secrets
            items:
            - key: SIGNING_KEY
              path: private.pem

  # Patch service name and labels
  - target:
      kind: Service
      name: service-placeholder-service
    patch: |-
      - op: replace
        path: /metadata/name
        value: auth-service
      - op: replace
        path: /metadata/labels/app
        value: auth-service
      - op: replace
        path: /spec/selector/app
        value: auth-service

  # Patch PVC names
  - target:
      kind: PersistentVolumeClaim
      name: service-placeholder-static-pvc
    patch: |-
      - op: replace
        path: /metadata/name
        value: auth-service-static-pvc
  - target:
      kind: PersistentVolumeClaim
      name: service-placeholder-media-pvc
    patch: |-
      - op: replace
        path: /metadata/name
        value: auth-service-media-pvc