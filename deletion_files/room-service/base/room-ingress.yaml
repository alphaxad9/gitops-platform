apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: room-ingress
  namespace: room-service
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: room.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: room-service
            port:
              number: 8000