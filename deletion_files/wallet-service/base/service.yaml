# services/wallet-service/base/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  labels:
    app: wallet-service
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  - port: 8001
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app: wallet-service
    component: api