# services/wallet-service/base/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-api
  labels:
    app: wallet-service
    component: api
    managed-by: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallet-service
      component: api
  template:
    metadata:
      labels:
        app: wallet-service
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: wallet-service-sa
      containers:
      - name: wallet-api
        image: alphaxad9/wallet_service:0.0.6
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8001
          name: metrics
        envFrom:
        - configMapRef:
            name: wallet-config
        - secretRef:
            name: wallet-secrets
        - secretRef:
            name: postgres-credentials
        - secretRef:
            name: rabbitmq-credentials
        - secretRef:
            name: kafka-credentials
        - secretRef:
            name: redis-credentials
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: DJANGO_SETTINGS_MODULE
          value: "wallet_service.settings"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/
            port: http
            httpHeaders:
            - name: Host
              value: wallet-service
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/
            port: http
            httpHeaders:
            - name: Host
              value: wallet-service
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health/
            port: http
            httpHeaders:
            - name: Host
              value: wallet-service
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: static-files
          mountPath: /app/static
        - name: media-files
          mountPath: /app/media
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: static-files
        persistentVolumeClaim:
          claimName: wallet-service-static-pvc
      - name: media-files
        persistentVolumeClaim:
          claimName: wallet-service-media-pvc
      - name: tmp
        emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000