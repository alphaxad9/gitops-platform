apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend

resources:
  - ../../base

labels:
  - pairs:
      environment: dev
      managed-by: gitops
    includeSelectors: false

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: frontend-config
    behavior: replace
    literals:
      # Frontend only needs NODE_ENV now - NO API URLs!
      - NODE_ENV=development

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend