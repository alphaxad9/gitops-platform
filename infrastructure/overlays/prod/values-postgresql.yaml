# gitops-platform/infrastructure/overlays/prod/values-postgresql.yaml
# Production config: HA, persistence, backups, TLS, Bitnami image

image:
  registry: docker.io
  repository: bitnami/postgresql
  tag: latest  # Pin to exact version in prod: 15.6.0-debian-11-r0
  pullPolicy: IfNotPresent

auth:
  existingSecret: postgres-credentials
  secretKeys:
    userPasswordKey: POSTGRES_PASSWORD
    adminPasswordKey: POSTGRES_PASSWORD
    replicationPasswordKey: POSTGRES_PASSWORD

architecture: replication  # HA: primary + read replicas

primary:
  persistence:
    enabled: true
    size: 100Gi
    storageClass: "gp3"
  resources:
    requests:
      memory: 2Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m
  podAffinityPreset: anti  # Spread across nodes

readReplicas:
  replicaCount: 2  # 2 read replicas for scale
  persistence:
    enabled: true
    size: 100Gi
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m

initdbScripts:
  create-databases.sql: |
    CREATE DATABASE authdb;
    CREATE DATABASE paymentdb;
    CREATE DATABASE bookingdb;
    CREATE DATABASE roomdb;
    CREATE DATABASE walletdb;

# ✅ Production: enable TLS
tls:
  enabled: true
  autoGenerated: false
  certificatesSecret: "postgres-tls-cert"

# ✅ Production backups via pgBackRest (or integrate with Velero)
backup:
  enabled: true
  cronJob:
    schedule: "0 2 * * *"  # Daily at 2 AM UTC
    retention: "7d"
  resources:
    requests:
      memory: 512Mi
      cpu: 250m

logLevel: WARN

# ✅ Monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# ✅ Pod disruption budget for HA
podDisruptionBudget:
  enabled: true
  minAvailable: 1