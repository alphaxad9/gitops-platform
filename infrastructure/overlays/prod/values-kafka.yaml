# gitops-platform/infrastructure/overlays/prod/values-kafka.yaml
# Production config: HA, persistence, TLS, SASL, Bitnami image

image:
  registry: docker.io
  repository: bitnami/kafka
  # Use a verified existing tag - check Docker Hub for available tags
  tag: 3.4.0-debian-11-r48  # Updated to a verified existing tag
  pullPolicy: IfNotPresent

replicaCount: 3  # HA: 3 brokers

# ✅ KRaft mode (no ZooKeeper)
kraft:
  enabled: true
  # Cluster ID for KRaft mode
  clusterId: "MkU3OEVBNTcwNTJENDM2Qk"  # Fixed cluster ID for stability
  controllerQuorumVoters: "0@kafka-0.kafka-headless.infrastructure.svc.cluster.local:9093,1@kafka-1.kafka-headless.infrastructure.svc.cluster.local:9093,2@kafka-2.kafka-headless.infrastructure.svc.cluster.local:9093"

# ✅ Fix: Proper listener configuration for Bitnami chart
listeners:
  client:
    protocol: SASL_SSL
    containerPort: 9092
    name: CLIENT
  controller:
    protocol: PLAINTEXT
    containerPort: 9093
    name: CONTROLLER
  interbroker:
    protocol: SASL_PLAINTEXT
    containerPort: 9094
    name: INTERNAL

# ✅ Fix: Add listener names
listenerNames:
  - CLIENT
  - CONTROLLER
  - INTERNAL

# ✅ Fix: Security protocol mapping
listenerSecurityProtocolMap: |
  CONTROLLER:PLAINTEXT
  INTERNAL:SASL_PLAINTEXT
  CLIENT:SASL_SSL

# ✅ Fix: Advertised listeners for external access
advertisedListeners:
  CLIENT: "CLIENT://{{ .Release.Name }}-{{ .StatefulSet.PodIndex }}.{{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc.cluster.local:9092"
  INTERNAL: "INTERNAL://{{ .Release.Name }}-{{ .StatefulSet.PodIndex }}.{{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc.cluster.local:9094"

# ✅ Persistence configuration
persistence:
  enabled: true
  size: 100Gi
  # storageClass: "gp3"  # Comment out if your cluster doesn't have this
  accessModes:
    - ReadWriteOnce

# ✅ Resource limits
resources:
  requests:
    memory: 4Gi
    cpu: 2000m
  limits:
    memory: 8Gi
    cpu: 4000m

# ✅ Production: enable TLS
tls:
  enabled: true
  autoGenerated: true  # Set to true initially to auto-generate certs
  # existingSecret: "kafka-tls-cert"  # Uncomment when you have your own certs

# ✅ SASL/SCRAM auth via existing secret
auth:
  clientProtocol: sasl_ssl
  interBrokerProtocol: sasl_plaintext
  existingSecret: kafka-credentials
  existingSecretPasswordKey: KAFKA_PASSWORD
  clientUsers:
    - auth-service
    - payment-service
  # Enable SCRAM-SHA-512 for better security
  saslMechanisms: SCRAM-SHA-512

# ✅ Disable auto-create in prod (manage via IaC)
autoCreateTopicsEnable: false

# ✅ Logging configuration
logLevel: WARN
log:
  kafka:
    logLevel: WARN

# ✅ Monitoring & metrics
metrics:
  enabled: true
  kafka:
    enabled: true
  jmx:
    enabled: true
  serviceMonitor:
    enabled: true
    # namespace: monitoring  # Uncomment if using monitoring namespace
    labels:
      release: prometheus

# ✅ Log retention for compliance
config:
  log:
    retention:
      hours: 168  # 7 days
      bytes: 1073741824  # 1GB per partition
  offset:
    retention:
      minutes: 10080  # 7 days
  # Additional Kafka configurations
  num:
    partitions: 3  # Default number of partitions
  default:
    replication:
      factor: 3  # Default replication factor

# ✅ Pod disruption budget for HA
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ✅ Anti-affinity to spread across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
          topologyKey: kubernetes.io/hostname

# ✅ Node selector (optional)
# nodeSelector:
#   kubernetes.io/arch: amd64

# ✅ Update strategy for StatefulSet
updateStrategy:
  type: RollingUpdate

# ✅ Service account
serviceAccount:
  create: true
  name: kafka

# ✅ Headless service for broker discovery
headless:
  service:
    ports:
      - name: tcp-client
        port: 9092
      - name: tcp-internal
        port: 9094
      - name: tcp-controller
        port: 9093

# ✅ Zookeeper (disabled since using KRaft)
zookeeper:
  enabled: false