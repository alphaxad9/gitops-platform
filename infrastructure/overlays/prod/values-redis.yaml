# gitops-platform/infrastructure/overlays/prod/values-redis.yaml
# Production config: Sentinel HA, persistence, TLS, monitoring

image:
  registry: docker.io
  repository: bitnami/redis
  tag: latest  # Pin to specific version in prod
  pullPolicy: IfNotPresent

architecture: replication

auth:
  enabled: true
  existingSecret: redis-credentials
  existingSecretPasswordKey: REDIS_PASSWORD

master:
  persistence:
    enabled: true
    size: 50Gi
    storageClass: "gp3"
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m

replica:
  replicaCount: 2
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 125m
    limits:
      memory: 512Mi
      cpu: 250m

# ✅ Sentinel for automatic failover
sentinel:
  enabled: true
  replicaCount: 3
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m

# ✅ Production: enable TLS
tls:
  enabled: true
  autoGenerated: false
  existingSecret: "redis-tls-cert"

logLevel: warn

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# ✅ Production memory config
config:
  maxmemory: "800mb"
  maxmemory-policy: "allkeys-lru"
  protected-mode: "yes"
  tcp-keepalive: "60"
  timeout: "300"