# gitops-platform/infrastructure/overlays/prod/values.yaml
# Combined values file for all infrastructure components
# Production configuration - HA, Persistence, TLS, Monitoring

# ============================================
# PostgreSQL Values
# ============================================
postgresql:
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: latest  # Pin to exact version in prod: 15.6.0-debian-11-r0
    pullPolicy: IfNotPresent

  auth:
    existingSecret: postgres-credentials
    secretKeys:
      userPasswordKey: POSTGRES_PASSWORD
      adminPasswordKey: POSTGRES_PASSWORD
      replicationPasswordKey: POSTGRES_PASSWORD

  architecture: replication  # HA: primary + read replicas

  primary:
    persistence:
      enabled: true
      size: 100Gi
      storageClass: "gp3"
    resources:
      requests:
        memory: 2Gi
        cpu: 1000m
      limits:
        memory: 4Gi
        cpu: 2000m
    podAffinityPreset: anti  # Spread across nodes

  readReplicas:
    replicaCount: 2  # 2 read replicas for scale
    persistence:
      enabled: true
      size: 100Gi
    resources:
      requests:
        memory: 1Gi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: 1000m

  initdbScripts:
    create-databases.sql: |
      CREATE DATABASE authdb;
      CREATE DATABASE paymentdb;
      CREATE DATABASE bookingdb;
      CREATE DATABASE roomdb;
      CREATE DATABASE walletdb;

  # ✅ Production: enable TLS
  tls:
    enabled: true
    autoGenerated: false
    certificatesSecret: "postgres-tls-cert"

  # ✅ Production backups via pgBackRest (or integrate with Velero)
  backup:
    enabled: true
    cronJob:
      schedule: "0 2 * * *"  # Daily at 2 AM UTC
      retention: "7d"
    resources:
      requests:
        memory: 512Mi
        cpu: 250m

  logLevel: WARN

  # ✅ Monitoring
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  # ✅ Pod disruption budget for HA
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ============================================
# RabbitMQ Values
# ============================================
rabbitmq:
  image:
    registry: docker.io
    repository: bitnami/rabbitmq
    tag: latest  # Pin to specific version in prod: 3.13.2-debian-11-r0
    pullPolicy: IfNotPresent

  replicaCount: 3  # HA cluster

  persistence:
    enabled: true
    size: 50Gi
    storageClass: "gp3"

  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m

  auth:
    existingSecret: rabbitmq-credentials
    existingSecretPasswordKey: RABBITMQ_PASS
    existingSecretErlangCookieKey: RABBITMQ_ERLANG_COOKIE

  extraPlugins: "rabbitmq_management rabbitmq_prometheus rabbitmq_peer_discovery_k8s rabbitmq_shovel"

  extraConfiguration: |
    default_vhost = microservice_one
    cluster_formation.peer_discovery_backend = rabbit_peer_discovery_k8s
    cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
    cluster_formation.k8s.address_type = hostname
    cluster_formation.node_cleanup.only_log_warning = true

  loadDefinition:
    enabled: true
    existingSecret: rabbitmq-credentials
    existingSecretKey: load-definition

  # ✅ Production: enable TLS
  tls:
    enabled: true
    failIfNoPeerCert: true
    caCertificateSecret: "rabbitmq-ca-cert"
    certificateSecret: "rabbitmq-tls-cert"
    keySecret: "rabbitmq-tls-cert"

  logLevel: warn

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  # ✅ Pod disruption budget for HA
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  # ✅ Anti-affinity to spread across nodes
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: rabbitmq
            topologyKey: kubernetes.io/hostname

  # ✅ Resource limits for queue protection
  extraEnvVars:
    - name: RABBITMQ_VM_MEMORY_HIGH_WATERMARK
      value: "0.6"
    - name: RABBITMQ_DISK_FREE_LIMIT
      value: "2GB"

# ============================================
# Redis Values
# ============================================
redis:
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: latest  # Pin to specific version in prod
    pullPolicy: IfNotPresent

  architecture: replication

  auth:
    enabled: true
    existingSecret: redis-credentials
    existingSecretPasswordKey: REDIS_PASSWORD

  master:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: "gp3"
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m

  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 50Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 125m
      limits:
        memory: 512Mi
        cpu: 250m

  # ✅ Sentinel for automatic failover
  sentinel:
    enabled: true
    replicaCount: 3
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 100m

  # ✅ Production: enable TLS
  tls:
    enabled: true
    autoGenerated: false
    existingSecret: "redis-tls-cert"

  logLevel: warn

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  # ✅ Production memory config
  config:
    maxmemory: "800mb"
    maxmemory-policy: "allkeys-lru"
    protected-mode: "yes"
    tcp-keepalive: "60"
    timeout: "300"

# ============================================
# Kafka Values
# ============================================
kafka:
  image:
    registry: docker.io
    repository: bitnami/kafka
    tag: 3.4.0-debian-11-r48
    pullPolicy: IfNotPresent

  replicaCount: 3  # HA: 3 brokers

  # ✅ KRaft mode (no ZooKeeper)
  kraft:
    enabled: true
    clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
    controllerQuorumVoters: "0@kafka-0.kafka-headless.infrastructure.svc.cluster.local:9093,1@kafka-1.kafka-headless.infrastructure.svc.cluster.local:9093,2@kafka-2.kafka-headless.infrastructure.svc.cluster.local:9093"

  listeners:
    client:
      protocol: SASL_SSL
      containerPort: 9092
      name: CLIENT
    controller:
      protocol: PLAINTEXT
      containerPort: 9093
      name: CONTROLLER
    interbroker:
      protocol: SASL_PLAINTEXT
      containerPort: 9094
      name: INTERNAL

  listenerNames:
    - CLIENT
    - CONTROLLER
    - INTERNAL

  listenerSecurityProtocolMap: |
    CONTROLLER:PLAINTEXT
    INTERNAL:SASL_PLAINTEXT
    CLIENT:SASL_SSL

  advertisedListeners:
    CLIENT: "CLIENT://{{ .Release.Name }}-{{ .StatefulSet.PodIndex }}.{{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc.cluster.local:9092"
    INTERNAL: "INTERNAL://{{ .Release.Name }}-{{ .StatefulSet.PodIndex }}.{{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc.cluster.local:9094"

  persistence:
    enabled: true
    size: 100Gi
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      memory: 4Gi
      cpu: 2000m
    limits:
      memory: 8Gi
      cpu: 4000m

  tls:
    enabled: true
    autoGenerated: true

  auth:
    clientProtocol: sasl_ssl
    interBrokerProtocol: sasl_plaintext
    existingSecret: kafka-credentials
    existingSecretPasswordKey: KAFKA_PASSWORD
    clientUsers:
      - auth-service
      - payment-service
    saslMechanisms: SCRAM-SHA-512

  autoCreateTopicsEnable: false

  logLevel: WARN
  log:
    kafka:
      logLevel: WARN

  metrics:
    enabled: true
    kafka:
      enabled: true
    jmx:
      enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: prometheus

  config:
    log:
      retention:
        hours: 168
        bytes: 1073741824
    offset:
      retention:
        minutes: 10080
    num:
      partitions: 3
    default:
      replication:
        factor: 3

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: kafka
            topologyKey: kubernetes.io/hostname

  updateStrategy:
    type: RollingUpdate

  serviceAccount:
    create: true
    name: kafka

  headless:
    service:
      ports:
        - name: tcp-client
          port: 9092
        - name: tcp-internal
          port: 9094
        - name: tcp-controller
          port: 9093

  zookeeper:
    enabled: false

# ============================================
# Traefik Values
# ============================================
traefik:
  image:
    name: traefik
    tag: v2.11  # Pin to exact patch version in prod: v2.11.0
    pullPolicy: IfNotPresent

  deployment:
    replicas: 2  # HA: multiple replicas
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

  logs:
    general:
      level: ERROR  # Less verbose in prod
    access:
      enabled: true
      format: json
      bufferingSize: 100

  # ✅ Disable insecure dashboard in prod (enable via separate secure ingress if needed)
  ingressRoute:
    dashboard:
      enabled: false

  additionalArguments:
    - "--providers.kubernetescrd.namespaces=auth-service,payment-service,infrastructure"
    - "--providers.kubernetesingress.namespaces=auth-service,payment-service,infrastructure"
    - "--accesslog=true"
    - "--accesslog.format=json"
    - "--accesslog.bufferingsize=100"
    - "--metrics.prometheus=true"
    - "--metrics.prometheus.entryPoint=metrics"
    - "--entryPoints.metrics.address=:9100"
    - "--serverstransport.insecureskipverify=false"  # ✅ Verify backend TLS

  ports:
    web:
      port: 80
      expose: true
      redirectTo:
        port: websecure
        scheme: https
        permanent: true
    websecure:
      port: 443
      expose: true
      tls:
        enabled: true
        options: "default"
    metrics:
      port: 9100
      expose: true

  # ✅ Strong TLS configuration
  tlsOptions:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384

  # ✅ Let's Encrypt for automatic certs (if using)
  certificatesResolvers:
    letsencrypt:
      acme:
        email: prod-admin@example.com
        storage: /data/acme.json
        httpChallenge:
          entryPoint: web

  # ✅ Metrics
  metrics:
    prometheus:
      enabled: true
      entryPoint: metrics
      addEntryPointsLabels: true
      addRoutersLabels: true
      addServicesLabels: true

  # ✅ Resources for prod
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

  # ✅ Anti-affinity to spread across nodes
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: traefik
            topologyKey: kubernetes.io/hostname