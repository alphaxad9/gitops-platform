# gitops-platform/infrastructure/overlays/dev/values-traefik.yaml
# Dev config: Single replica, dashboard enabled, no TLS

# ✅ Use Traefik image (chart default) or specify exact tag
image:
  name: traefik
  tag: v2.11  # Your specified version
  pullPolicy: IfNotPresent

deployment:
  replicas: 1

service:
  type: LoadBalancer  # Works in cloud; use NodePort for Kind/minikube

# ✅ Dev logging
logs:
  general:
    level: DEBUG
  access:
    enabled: true

# ✅ Enable dashboard for dev (insecure - dev only!)
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.dev.local`)
    entryPoints:
      - web
    middlewares: []
    tls: {}

# ✅ Dev arguments: enable dashboard, access logs, debug
additionalArguments:
  - "--api.insecure=true"  # ⚠️ Dev-only: no auth on dashboard
  - "--api.dashboard=true"
  - "--accesslog=true"
  - "--providers.kubernetescrd.namespaces=auth-service,payment-service,infrastructure"
  - "--providers.kubernetesingress.namespaces=auth-service,payment-service,infrastructure"

ports:
  web:
    port: 80
    expose: true
  websecure:
    port: 443
    expose: true
    tls:
      enabled: false  # Dev-only: disable TLS

# ✅ Dev-only: allow insecure backend connections
serversTransport:
  insecureSkipVerify: true

# ✅ Resources for dev
resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 100m

# ✅ Metrics (optional)
metrics:
  prometheus:
    enabled: false