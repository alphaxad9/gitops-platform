# gitops-platform/infrastructure/overlays/dev/values-rabbitmq.yaml
# Dev config: Single node, no persistence, Bitnami image

# ✅ Use Bitnami image (chart default) or specify exact tag
image:
  registry: docker.io
  repository: bitnami/rabbitmq
  tag: latest  # Or pin to specific: 3.13.2-debian-11-r0
  pullPolicy: IfNotPresent

replicaCount: 1

# ✅ Persistence disabled for fast dev iteration
persistence:
  enabled: false
  # size: 20Gi  # Uncomment for staging/prod

# ✅ Minimal resources for dev
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 250m

# ✅ Auth: Reference your existing base secret
auth:
  existingSecret: rabbitmq-credentials
  existingSecretPasswordKey: RABBITMQ_PASS
  existingSecretErlangCookieKey: RABBITMQ_ERLANG_COOKIE

# ✅ Plugins for management UI
extraPlugins: "rabbitmq_management rabbitmq_prometheus"

# ✅ Vhost configuration
extraConfiguration: |
  default_vhost = microservice_one

# ✅ Load queue/exchange definitions from your base secret
loadDefinition:
  enabled: true
  existingSecret: rabbitmq-credentials
  existingSecretKey: load-definition

# ✅ Dev-only: disable TLS, enable management UI
tls:
  enabled: false

management:
  tls:
    enabled: false

# ✅ Logging for debugging
logLevel: debug

# ✅ Metrics (optional)
metrics:
  enabled: false