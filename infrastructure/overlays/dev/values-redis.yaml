# gitops-platform/infrastructure/overlays/dev/values-redis.yaml
# Dev config: Standalone, no persistence, Bitnami image

# ✅ Use Bitnami image (chart default) or specify exact tag
image:
  registry: docker.io
  repository: bitnami/redis
  tag: latest  # Or pin: 7.2.4-debian-11-r0
  pullPolicy: IfNotPresent

architecture: standalone

# ✅ Auth: Reference your existing base secret
auth:
  enabled: true
  existingSecret: redis-credentials
  existingSecretPasswordKey: REDIS_PASSWORD

# ✅ Persistence disabled for fast dev iteration
master:
  persistence:
    enabled: false
    # size: 10Gi  # Uncomment for staging/prod

  # ✅ Minimal resources for dev
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# ✅ Dev-only: disable TLS
tls:
  enabled: false

# ✅ Single node for dev
replica:
  replicaCount: 0

# ✅ Logging for debugging
logLevel: debug

# ✅ Metrics (optional)
metrics:
  enabled: false