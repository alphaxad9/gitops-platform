# gitops-platform/infrastructure/overlays/dev/values.yaml
# Combined values file for all infrastructure components
# Development configuration - MINIMIZED for lightweight PC

# ============================================
# PostgreSQL Values - MINIMIZED
# ============================================
postgresql:
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: latest
    pullPolicy: IfNotPresent

  auth:
    existingSecret: postgres-credentials
    secretKeys:
      userPasswordKey: POSTGRES_PASSWORD
      adminPasswordKey: POSTGRES_PASSWORD

  architecture: standalone

  primary:
    persistence:
      enabled: false  # No disk usage

    resources:  # MINIMAL
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m

  initdbScripts:
    create-databases.sql: |
      CREATE DATABASE authdb;
      CREATE DATABASE paymentdb;

  tls:
    enabled: false  # Disable for speed

  logLevel: DEBUG

  metrics:
    enabled: false  # Disable metrics

# ============================================
# RabbitMQ Values - MINIMIZED
# ============================================
rabbitmq:
  image:
    registry: docker.io
    repository: bitnami/rabbitmq
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1  # Single node

  persistence:
    enabled: false  # No disk usage

  resources:  # MINIMAL
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m

  auth:
    existingSecret: rabbitmq-credentials
    existingSecretPasswordKey: RABBITMQ_PASS
    existingSecretErlangCookieKey: RABBITMQ_ERLANG_COOKIE

  extraPlugins: ""  # NO plugins - lighter

  extraConfiguration: |
    default_vhost = microservice_one

  loadDefinition:
    enabled: false  # Disable to save memory

  tls:
    enabled: false

  management:
    tls:
      enabled: false

  logLevel: debug

  metrics:
    enabled: false  # No metrics

# ============================================
# Redis Values - MINIMIZED
# ============================================
redis:
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: latest
    pullPolicy: IfNotPresent

  architecture: standalone

  auth:
    enabled: true
    existingSecret: redis-credentials
    existingSecretPasswordKey: REDIS_PASSWORD

  master:
    persistence:
      enabled: false  # No disk

    resources:  # MINIMAL
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m

  tls:
    enabled: false

  replica:
    replicaCount: 0  # NO replicas

  logLevel: debug

  metrics:
    enabled: false

# ============================================
# Kafka Values - FIXED FOR SINGLE CONTROLLER
# ============================================
# ============================================
# Kafka Values - FIXED (Using Chart Default Image)
# ============================================
kafka:
  # REMOVED the custom 'image:' block to use the chart's default compatible image.
  # The chart version is 26.11.4, which expects Kafka 3.6.x.

  enabled: true
  replicaCount: 1  # Single node for dev

  # KRaft mode with SINGLE controller
  kraft:
    enabled: true
    clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
    controllerQuorumVoters: "0@platform-infra-kafka-controller-0.platform-infra-kafka-controller-headless.infrastructure.svc.cluster.local:9093"

  # Explicitly set controller count to 1, broker count to 0 for combined mode
  controller:
    replicaCount: 1
  broker:
    replicaCount: 0

  listeners:
    client:
      protocol: PLAINTEXT  # NO TLS for dev simplicity
      containerPort: 9092
      name: CLIENT
    controller:
      protocol: PLAINTEXT
      containerPort: 9093
      name: CONTROLLER
    interbroker:
      protocol: PLAINTEXT
      containerPort: 9094
      name: INTERNAL

  listenerNames:
    - CLIENT
    - CONTROLLER
    - INTERNAL

  listenerSecurityProtocolMap: |
    CONTROLLER:PLAINTEXT
    INTERNAL:PLAINTEXT
    CLIENT:PLAINTEXT

  advertisedListeners:
    CLIENT: "CLIENT://{{ .Release.Name }}-{{ .StatefulSet.PodIndex }}.{{ .Release.Name }}-controller-headless.{{ .Release.Namespace }}.svc.cluster.local:9092"

  persistence:
    enabled: true
    size: 2Gi  # Minimal storage for dev

  resources:  # Minimal resources for dev
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 400m

  tls:
    enabled: false  # NO TLS

  auth:
    clientProtocol: plaintext
    interBrokerProtocol: plaintext
    enabled: false  # NO auth for dev simplicity

  autoCreateTopicsEnable: true  # Useful for dev

  logLevel: WARN

  metrics:
    enabled: false  # NO metrics

  zookeeper:
    enabled: false
    
# ============================================
# Traefik Values - MINIMIZED
# ============================================
traefik:
  image:
    name: traefik
    tag: v2.11
    pullPolicy: IfNotPresent

  deployment:
    replicas: 1

  service:
    type: LoadBalancer

  logs:
    general:
      level: DEBUG
    access:
      enabled: true

  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik.dev.local`)
      entryPoints:
        - web
      middlewares: []
      tls: {}

  additionalArguments:
    - "--api.insecure=true"
    - "--api.dashboard=true"
    - "--accesslog=true"
    - "--providers.kubernetescrd.namespaces=auth-service,payment-service,infrastructure"
    - "--providers.kubernetesingress.namespaces=auth-service,payment-service,infrastructure"

  ports:
    web:
      port: 80
      expose: true
    websecure:
      port: 443
      expose: true
      tls:
        enabled: false

  serversTransport:
    insecureSkipVerify: true

  resources:  # MINIMAL
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 64Mi
      cpu: 50m

  metrics:
    prometheus:
      enabled: false