# gitops-platform/infrastructure/overlays/dev/values-postgresql.yaml
# Dev config: Standalone, no persistence, Bitnami image

# ✅ Use your specified Bitnami PostgreSQL image
image:
  registry: docker.io
  repository: bitnami/postgresql
  tag: latest  # Or pin: 15.6.0-debian-11-r0
  pullPolicy: IfNotPresent

# ✅ Auth: Reference your existing base secret
auth:
  existingSecret: postgres-credentials
  secretKeys:
    userPasswordKey: POSTGRES_PASSWORD
    adminPasswordKey: POSTGRES_PASSWORD

# ✅ Standalone for dev (no replication)
architecture: standalone

# ✅ Persistence disabled for fast dev iteration
primary:
  persistence:
    enabled: false
    # size: 20Gi  # Uncomment for staging/prod

  # ✅ Minimal resources for dev
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

# ✅ Init scripts to create your databases
initdbScripts:
  create-databases.sql: |
    CREATE DATABASE authdb;
    CREATE DATABASE paymentdb;

# ✅ Dev-only: disable TLS
tls:
  enabled: false

# ✅ Logging for debugging
logLevel: DEBUG

# ✅ Metrics (optional)
metrics:
  enabled: false