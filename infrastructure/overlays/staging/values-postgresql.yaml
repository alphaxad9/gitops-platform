# gitops-platform/infrastructure/overlays/staging/values-postgresql.yaml
# Staging config: Replication, persistence, Bitnami image

image:
  registry: docker.io
  repository: bitnami/postgresql
  tag: latest
  pullPolicy: IfNotPresent

auth:
  existingSecret: postgres-credentials
  secretKeys:
    userPasswordKey: POSTGRES_PASSWORD

architecture: replication  # Test read replicas

primary:
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

readReplicas:
  replicaCount: 1
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

initdbScripts:
  create-databases.sql: |
    CREATE DATABASE authdb;
    CREATE DATABASE paymentdb;
    CREATE DATABASE bookingdb;
    CREATE DATABASE roomdb;
    CREATE DATABASE walletdb;

tls:
  enabled: false  # Enable in prod; test in staging if needed

logLevel: INFO

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# ✅ Basic backups for staging
backup:
  enabled: true
  cronJob:
    schedule: "0 4 * * *"  # Daily at 4 AM
    retention: "3d"