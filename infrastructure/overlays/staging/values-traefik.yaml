# gitops-platform/infrastructure/overlays/staging/values-traefik.yaml
# Staging config: TLS enabled, dashboard restricted, monitoring

image:
  name: traefik
  tag: v2.11
  pullPolicy: IfNotPresent

deployment:
  replicas: 1

service:
  type: LoadBalancer

logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

# ✅ Dashboard enabled but restricted to staging hostname
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.staging.local`)
    entryPoints:
      - websecure
    middlewares: []
    tls: {}

additionalArguments:
  - "--providers.kubernetescrd.namespaces=auth-service,payment-service,infrastructure"
  - "--providers.kubernetesingress.namespaces=auth-service,payment-service,infrastructure"
  - "--accesslog=true"
  - "--accesslog.format=json"
  - "--metrics.prometheus=true"
  - "--serverstransport.insecureskipverify=false"

ports:
  web:
    port: 80
    expose: true
    redirectTo:
      port: websecure
  websecure:
    port: 443
    expose: true
    tls:
      enabled: true
      options: "default"

# ✅ TLS options for staging
tlsOptions:
  default:
    minVersion: VersionTLS12

# ✅ Metrics for monitoring
metrics:
  prometheus:
    enabled: true
    entryPoint: metrics

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 200m