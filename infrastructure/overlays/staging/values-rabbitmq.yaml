# gitops-platform/infrastructure/overlays/staging/values-rabbitmq.yaml
# Staging config: Production-like, persistence enabled

image:
  registry: docker.io
  repository: bitnami/rabbitmq
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2  # Test clustering

persistence:
  enabled: true
  size: 30Gi
  # storageClass: "gp3"  # Uncomment if using specific class

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m

auth:
  existingSecret: rabbitmq-credentials
  existingSecretPasswordKey: RABBITMQ_PASS
  existingSecretErlangCookieKey: RABBITMQ_ERLANG_COOKIE

extraPlugins: "rabbitmq_management rabbitmq_prometheus rabbitmq_peer_discovery_k8s"

extraConfiguration: |
  default_vhost = microservice_one
  cluster_formation.peer_discovery_backend = rabbit_peer_discovery_k8s
  cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
  cluster_formation.k8s.address_type = hostname

loadDefinition:
  enabled: true
  existingSecret: rabbitmq-credentials
  existingSecretKey: load-definition

tls:
  enabled: false  # Enable in prod; test in staging if needed

logLevel: info

metrics:
  enabled: true
  serviceMonitor:
    enabled: true