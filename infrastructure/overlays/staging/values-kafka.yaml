# gitops-platform/infrastructure/overlays/staging/values-kafka.yaml
# Staging config: Production-like, KRaft, Bitnami image

image:
  registry: docker.io
  repository: bitnami/kafka
  tag: 3.4.0-debian-11-r33
  pullPolicy: IfNotPresent

replicaCount: 2  # Test HA with 2 nodes

kraft:
  enabled: true
  controllerQuorumVoters: "0@kafka-0.kafka-headless.infrastructure.svc.cluster.local:9093,1@kafka-1.kafka-headless.infrastructure.svc.cluster.local:9093"

listeners:
  client:
    protocol: PLAINTEXT
    containerPort: 9092
  controller:
    protocol: PLAINTEXT
    containerPort: 9093
  interbroker:
    protocol: PLAINTEXT
    containerPort: 9094

persistence:
  enabled: true
  size: 50Gi
  # storageClass: "gp3"  # Uncomment if using specific class

resources:
  requests:
    memory: 2Gi
    cpu: 1000m
  limits:
    memory: 4Gi
    cpu: 2000m

tls:
  enabled: false  # Enable in prod; test in staging if needed

autoCreateTopicsEnable: true

logLevel: INFO

metrics:
  enabled: true
  serviceMonitor:
    enabled: true