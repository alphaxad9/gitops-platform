# gitops-platform/infrastructure/overlays/staging/values-redis.yaml
# Staging config: Replication, persistence, no Sentinel

image:
  registry: docker.io
  repository: bitnami/redis
  tag: latest
  pullPolicy: IfNotPresent

architecture: replication

auth:
  enabled: true
  existingSecret: redis-credentials
  existingSecretPasswordKey: REDIS_PASSWORD

master:
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 400m

replica:
  replicaCount: 1
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# ✅ Skip Sentinel in staging for simplicity
sentinel:
  enabled: false

tls:
  enabled: false  # Enable in prod; test in staging if needed

logLevel: info

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# ✅ Memory config for staging
config:
  maxmemory: "400mb"
  maxmemory-policy: "allkeys-lru"