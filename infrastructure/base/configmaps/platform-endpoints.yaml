apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-endpoints
  namespace: infrastructure
data:
  # PostgreSQL
  POSTGRES_HOST: "postgresql"  # Fixed: removed namespace duplication
  POSTGRES_PORT: "5432"
  
  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq"  # Fixed: removed namespace duplication
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "microservice_one"
  RABBITMQ_QUEUE: "microservice_one.events"
  
  # Redis
  REDIS_HOST: "redis-master"  # Fixed: removed namespace duplication
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Kafka
  KAFKA_BROKERS: "kafka:9092"  # Fixed: removed namespace and FQDN
  KAFKA_TOPIC: "microservice_one.events"
  
  # Service URLs - using short names (best practice for internal cluster communication)
  AUTH_SERVICE_URL: "http://auth-service:8000"  # Fixed: now uses short name
  PAYMENT_SERVICE_URL: "http://payment-service:8000"  # Fixed: now uses short name