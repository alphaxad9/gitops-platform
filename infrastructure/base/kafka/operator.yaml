apiVersion: v1
kind: ServiceAccount
metadata:
  name: strimzi-cluster-operator
  namespace: kafka-operator
  labels:
    app: strimzi
    app.kubernetes.io/name: strimzi-cluster-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: kafka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: strimzi-cluster-operator-namespaced
  labels:
    app: strimzi
    app.kubernetes.io/name: strimzi-cluster-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: kafka
rules:
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings"]
  verbs: ["create", "get", "list", "watch", "update", "delete", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: ["kafka.strimzi.io"]
  resources: ["kafkas", "kafkanodepools", "kafkatopics", "kafkausers"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: strimzi-cluster-operator
  labels:
    app: strimzi
    app.kubernetes.io/name: strimzi-cluster-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: kafka
subjects:
- kind: ServiceAccount
  name: strimzi-cluster-operator
  namespace: kafka-operator
roleRef:
  kind: ClusterRole
  name: strimzi-cluster-operator-namespaced
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strimzi-cluster-operator
  namespace: kafka-operator
  labels:
    app: strimzi
    app.kubernetes.io/name: strimzi-cluster-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: strimzi-cluster-operator
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strimzi-cluster-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/part-of: kafka
    spec:
      serviceAccountName: strimzi-cluster-operator
      containers:
      - name: strimzi-cluster-operator
        image: quay.io/strimzi/operator:0.38.0
        command:
          - /opt/strimzi/bin/cluster_operator_run.sh
        env:
        - name: STRIMZI_NAMESPACE
          value: "*"
        - name: STRIMZI_FULL_RECONCILIATION_INTERVAL_MS
          value: "120000"
        - name: STRIMZI_LOG_LEVEL
          value: INFO
        - name: STRIMZI_FEATURE_GATES
          value: +UseKRaft
        # Kafka version mappings - CRITICAL for operator to know which images to use
        - name: STRIMZI_KAFKA_IMAGES
          value: |
            3.5.0=quay.io/strimzi/kafka:0.38.0-kafka-3.5.0
            3.6.0=quay.io/strimzi/kafka:0.38.0-kafka-3.6.0
        - name: STRIMZI_KAFKA_CONNECT_IMAGES
          value: |
            3.5.0=quay.io/strimzi/kafka:0.38.0-kafka-3.5.0
            3.6.0=quay.io/strimzi/kafka:0.38.0-kafka-3.6.0
        - name: STRIMZI_KAFKA_MIRROR_MAKER_2_IMAGES
          value: |
            3.5.0=quay.io/strimzi/kafka:0.38.0-kafka-3.5.0
            3.6.0=quay.io/strimzi/kafka:0.38.0-kafka-3.6.0
        - name: STRIMZI_DEFAULT_TOPIC_OPERATOR_IMAGE
          value: quay.io/strimzi/operator:0.38.0
        - name: STRIMZI_DEFAULT_USER_OPERATOR_IMAGE
          value: quay.io/strimzi/operator:0.38.0
        - name: STRIMZI_DEFAULT_KAFKA_INIT_IMAGE
          value: quay.io/strimzi/operator:0.38.0
        - name: STRIMZI_DEFAULT_KAFKA_BRIDGE_IMAGE
          value: quay.io/strimzi/kafka-bridge:0.28.0
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"