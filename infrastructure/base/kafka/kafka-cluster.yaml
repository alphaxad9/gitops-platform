apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: infrastructure
  labels:
    managed-by: gitops
spec:
  kafka:
    replicas: 1
    version: 3.6.0  # ⚠️ IMPORTANT: Strimzi 0.38.0/0.51.0 doesn't support Kafka 4.x yet
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: "3.6"
      log.message.format.version: "3.6"
    # ❌ REMOVE the image line - Strimzi uses its own images
    # image: apache/kafka:4.1.1
    
  zookeeper:
    replicas: 1
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
    # ❌ REMOVE this image line too
    # image: apache/kafka:4.1.1
    
  entityOperator:
    topicOperator: {}
    userOperator: {}