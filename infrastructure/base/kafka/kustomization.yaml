apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: traefik
  repo: https://helm.traefik.io/traefik
  version: 25.0.0
  releaseName: traefik
  namespace: infrastructure
  includeCRDs: true
  valuesInline:
    image:
      name: traefik
      tag: v2.11
    deployment:
      replicas: 1
    service:
      type: LoadBalancer
    logs:
      general:
        level: DEBUG
    ports:
      web:
        port: 80
      websecure:
        port: 443