apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: infrastructure
  labels:
    app: traefik
    managed-by: gitops
data:
  traefik.yaml: |
    # Global
    global:
      sendAnonymousUsage: false
    
    # EntryPoints
    entryPoints:
      web:
        address: ":80"
      websecure:
        address: ":443"
      traefik:
        address: ":9000"
    
    # Providers
    providers:
      kubernetesCRD:
        namespaces: []
      kubernetesIngress:
        namespaces: []
    
    # API and Dashboard
    api:
      dashboard: true
      insecure: true
    
    # Logs
    log:
      level: DEBUG
    
    # Access Logs
    accessLog: {}
    
    # Metrics
    metrics:
      prometheus: {}