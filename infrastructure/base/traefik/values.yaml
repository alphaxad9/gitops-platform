image:
  name: traefik
  tag: v2.11
deployment:
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
service:
  type: LoadBalancer
additionalArguments:
  - "--configFile=/config/traefik.yaml"
additionalVolumes:
  - name: config
    configMap:
      name: traefik-config
additionalVolumeMounts:
  - name: config
    mountPath: /config
logs:
  general:
    level: DEBUG
accessLog:
  enabled: true
ports:
  web:
    port: 80
    expose: true
    redirectTo:
      port: websecure
  websecure:
    port: 443
    expose: true
    tls:
      enabled: true
providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true