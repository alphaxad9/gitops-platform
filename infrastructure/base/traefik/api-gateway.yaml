apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: infrastructure
spec:
  stripPrefix:
    prefixes:
      - /api/auth
      - /api/room
      - /api/booking
      - /api/post
      - /api/wallet
      - /api/payment
    forceSlash: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-gateway
  namespace: infrastructure
spec:
  entryPoints:
    - web
  routes:
    # Auth Service
    - match: PathPrefix(`/api/auth`)
      kind: Rule
      services:
        - name: auth-service
          namespace: auth-service
          port: 8000
      middlewares:
        - name: strip-api-prefix
    
    # Room Service
    - match: PathPrefix(`/api/room`)
      kind: Rule
      services:
        - name: room-service
          namespace: room-service
          port: 8000
      middlewares:
        - name: strip-api-prefix
    
    # Booking Service
    - match: PathPrefix(`/api/booking`)
      kind: Rule
      services:
        - name: booking-service
          namespace: booking-service
          port: 8000
      middlewares:
        - name: strip-api-prefix
    
    # Post Service (Go - port 8080)
    - match: PathPrefix(`/api/post`)
      kind: Rule
      services:
        - name: post-service
          namespace: post-service
          port: 8080
      middlewares:
        - name: strip-api-prefix
    
    # Wallet Service
    - match: PathPrefix(`/api/wallet`)
      kind: Rule
      services:
        - name: wallet-service
          namespace: wallet-service
          port: 8000
      middlewares:
        - name: strip-api-prefix
    
    # Payment Service (if you add it later)
    - match: PathPrefix(`/api/payment`)
      kind: Rule
      services:
        - name: payment-service
          namespace: payment-service
          port: 8000
      middlewares:
        - name: strip-api-prefix