apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: infrastructure
spec:
  stripPrefix:
    prefixes:
      - /api/booking
      - /api/post
      - /api/wallet
    forceSlash: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-gateway
  namespace: infrastructure
spec:
  entryPoints:
    - web
  routes:
    # Auth Service - HIGH PRIORITY (uses rewrite, NOT strip)
    - match: PathPrefix(`/api/auth`)
      kind: Rule
      priority: 100
      services:
        - name: auth-service
          namespace: auth-service
          port: 8000
      middlewares:
        - name: auth-rewrite
          namespace: infrastructure
    
    # Room Service - HIGH PRIORITY (uses room-rewrite)
    - match: PathPrefix(`/api/room`)
      kind: Rule
      priority: 100
      services:
        - name: room-service
          namespace: room-service
          port: 8000
      middlewares:
        - name: room-rewrite
          namespace: infrastructure
    
    # Booking Service - HIGH PRIORITY
    - match: PathPrefix(`/api/booking`)
      kind: Rule
      priority: 100
      services:
        - name: booking-service
          namespace: booking-service
          port: 8000
      middlewares:
        - name: strip-api-prefix
          namespace: infrastructure
    
    # Post Service (Go - port 8080) - HIGH PRIORITY
    - match: PathPrefix(`/api/post`)
      kind: Rule
      priority: 100
      services:
        - name: post-service
          namespace: post-service
          port: 8080
      middlewares:
        - name: strip-api-prefix
          namespace: infrastructure
    
    # Wallet Service - HIGH PRIORITY
    - match: PathPrefix(`/api/wallet`)
      kind: Rule
      priority: 100
      services:
        - name: wallet-service
          namespace: wallet-service
          port: 8000
      middlewares:
        - name: strip-api-prefix
          namespace: infrastructure
    
    # Frontend static & SPA - LOW PRIORITY (catch-all)
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: frontend
          namespace: frontend
          port: 80