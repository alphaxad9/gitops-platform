apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- traefik-config.yaml

helmCharts:
- name: traefik
  repo: https://helm.traefik.io/traefik
  version: 25.0.0
  releaseName: traefik
  namespace: infrastructure
  includeCRDs: true
  valuesInline:
    image:
      name: traefik
      tag: v2.11
    deployment:
      replicas: 1
    service:
      type: LoadBalancer
    additionalVolumes:
      - name: config
        configMap:
          name: traefik-config
    additionalVolumeMounts:
      - name: config
        mountPath: /config
    logs:
      general:
        level: DEBUG
    accessLog:
      enabled: true
    ports:
      web:
        port: 80
        expose: true
        redirectTo:
          port: websecure
      websecure:
        port: 443
        expose: true
        tls:
          enabled: true
    providers:
      kubernetesCRD:
        enabled: true
      kubernetesIngress:
        enabled: true