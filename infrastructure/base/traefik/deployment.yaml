apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: infrastructure
  labels:
    app: traefik
    component: ingress-controller
    managed-by: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      containers:
      - name: traefik
        image: traefik:v2.11
        args:
          - "--configFile=/config/traefik.yaml"
        ports:
        - name: web
          containerPort: 80
        - name: websecure
          containerPort: 443
        - name: metrics
          containerPort: 9100
        - name: dashboard
          containerPort: 9000
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: config
        configMap:
          name: traefik-config
      - name: data
        emptyDir: {}