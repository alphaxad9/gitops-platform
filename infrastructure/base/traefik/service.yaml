apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: infrastructure
  labels:
    app: traefik
    component: ingress-controller
    managed-by: gitops
spec:
  type: LoadBalancer
  ports:
  - name: web
    port: 80
    targetPort: 80
  - name: websecure
    port: 443
    targetPort: 443
  - name: dashboard
    port: 9000
    targetPort: 9000
  selector:
    app: traefik