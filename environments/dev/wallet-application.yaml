apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wallet-service
  namespace: argocd
  annotations:
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/alphaxad9/microservice_wallet_service.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wallet-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: ""
    kind: Secret
    jsonPointers:
      - /data
  - group: apps
    kind: Deployment
    jsonPointers:
      - /spec/template/metadata/annotations
      - /spec/template/spec/containers/0/resources
  - group: ""
    kind: Service
    jsonPointers:
      - /spec/clusterIP
      - /spec/clusterIPs
  - group: networking.k8s.io
    kind: Ingress
    jsonPointers:
      - /metadata/annotations