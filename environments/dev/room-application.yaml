# gitops-platform/environments/dev/room-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: room-service
  annotations:
    environment: dev
spec:
  project: default
  source:
    repoURL: placeholder-repo
    targetRevision: placeholder-rev
    path: services/room-service/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: room-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
