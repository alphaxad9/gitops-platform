# gitops-platform/environments/prod/infrastructure-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  annotations:
    environment: prod
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  
  source:
    repoURL: placeholder-repo  # Will be replaced by kustomize patch
    targetRevision: placeholder-rev  # Will be replaced by kustomize patch
    path: infrastructure   # Point to Helm root, NOT overlays/prod
    
    helm:
      valueFiles:
        - values.yaml                  # Base values
        - overlays/prod/values.yaml    # Production overrides
        
  destination:
    server: https://kubernetes.default.svc
    namespace: infrastructure
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - Validate=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 10m